name: Refresh Job Listings

on:
  schedule:
    # 6:00 AM EST = 11:00 UTC
    - cron: "0 11 * * *"
    # 6:00 PM EST = 23:00 UTC
    - cron: "0 23 * * *"
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push jobs.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add jobs.json
          if git diff --cached --quiet; then
            echo "No changes to jobs.json — skipping commit"
          else
            TIMESTAMP=$(date -u "+%Y-%m-%d %H:%M UTC")
            git commit -m "chore: refresh job listings [${TIMESTAMP}]"
            git push
          fi
